[project]
name = "db-names"
version = "0.0.0"
description = "Парсер структуры хранения базы 1С"
requires-python = ">=3.13"
dependencies = [
    "bom-decompressor",
    "curly-array",
    "frozendict>=2.4.6",
    "orjson>=3.11.3",
    "pyodbc>=5.2.0",
    "sqlmodel>=0.0.24",
]

[tool.uv.sources]
curly-array = { git = "https://gitflic.ru/project/e1c/py-curly-array.git" }
bom-decompressor = { git = "https://gitflic.ru/project/e1c/py-bom-decompressor.git" }
